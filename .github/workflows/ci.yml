name: CI

# Both triggers are required: pull_request makes the check appear on PRs so branch
# protection (Stage B) can require it; push covers the direct-to-main Stage A commits.
on:
  push:
  pull_request:

jobs:
  backend:
    name: backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend (with dev deps)
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Test (pytest)
        run: pytest -q

  frontend:
    name: frontend (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
